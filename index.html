<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>手机端宠物展示（防歪防乱码版）</title>
    
    <style>
        /* CSS 样式：解决布局歪了 */
        
        body {
            margin: 0;
            padding: 10px;
            background-color: #f0f0f0;
            /* 字体设置，防止手机端文字大小失控 */
            font-family: -apple-system, Helvetica, sans-serif;
        }

        /* 宠物列表容器 */
        .pet-list {
            display: flex;
            flex-wrap: wrap; /* 允许换行 */
            justify-content: space-between; /* 两端对齐，中间留空 */
            padding: 0;
            margin: 0;
            list-style: none;
        }

        /* 每个宠物卡片：手机端一行排两个 */
        .pet-card {
            /* 关键：宽度设置为将近一半，留一点空隙 */
            width: 48%; 
            background-color: white;
            margin-bottom: 15px; /* 下方间距 */
            border-radius: 8px;
            overflow: hidden; /* 边框切齐 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box; /* 防止 padding 撑破布局 */
        }

        /* 宠物图片容器：强制正方形 */
        .pet-img-wrap {
            width: 100%;
            height: 0;
            padding-top: 100%; /* 1:1 比例 */
            position: relative;
            background-color: #e0e0e0; /* 加载前占位色 */
        }

        /* 宠物图片自身样式：防歪核心 */
        .pet-img-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 【防歪核心】自动裁剪填充，不拉伸，不变形 */
            object-fit: cover; 
        }

        /* 宠物名字文字：防乱码 */
        .pet-name {
            padding: 8px;
            margin: 0;
            font-size: 14px;
            text-align: center;
            color: #333;
            /* 防止名字过长撑歪布局，超出会显示省略号 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h3 style="text-align:center;">我的可爱宠物</h3>

    <ul class="pet-list">
        <li class="pet-card">
            <div class="pet-img-wrap">
                <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=400" alt="宠物图">
            </div>
            <p class="pet-name">可爱咪咪</p>
        </li>

        <li class="pet-card">
            <div class="pet-img-wrap">
                <img src="https://images.unsplash.com/photo-1583337130417-3346a1be7ded?q=80&w=400" alt="宠物图">
            </div>
            <p class="pet-name">贪吃旺财</p>
        </li>

        <li class="pet-card">
            <div class="pet-img-wrap">
                <img src="https://images.unsplash.com/photo-1592194996308-7b43878e84a6?q=80&w=400" alt="宠物图">
            </div>
            <p class="pet-name">高冷Pocky</p>
        </li>
    </ul>

</body>
</html>
