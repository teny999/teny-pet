<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teny 2.7 | 准时奇遇版</title>
    <style>
        :root { --bg: #FFF9E3; --text: #4A4A4A; --bar-bg: #E0DCC8; --accent: #FF8E8E; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: "PingFang SC", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; padding: 0 15px; box-sizing: border-box; overflow: hidden;
            transition: background 0.4s ease;
        }
        
        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(0.8) translateY(10px); }
            60% { transform: scale(1.1) translateY(-25px); }
        }

        #pet-container { 
            font-size: 15vw; height: 140px; 
            display: flex; align-items: center; justify-content: center;
            animation: breathe 3s infinite ease-in-out;
            user-select: none; white-space: nowrap; cursor: pointer;
            -webkit-tap-highlight-color: transparent; z-index: 10;
        }
        #pet-container.active { animation: bounce 0.4s ease; }

        .stats { width: 100%; max-width: 280px; margin-top: 5px; }
        .bar-label { font-size: 12px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; color: #8C8465; }
        .bar-bg { width: 100%; height: 14px; background: var(--bar-bg); border-radius: 20px; margin-bottom: 12px; overflow: hidden; border: 2px solid #4A4A4A; position: relative; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 20px; }
        #h-fill { background: #FFAB76; }
        #s-fill { background: #FFD93D; }

        .btns { display: flex; gap: 15px; margin-top: 10px; width: 100%; justify-content: center; }
        button { 
            flex: 0 1 120px; padding: 12px 0; border: 2px solid #4A4A4A; 
            background: var(--accent); color: white; border-radius: 50px;
            font-weight: bold; font-size: 16px; cursor: pointer; 
            box-shadow: 0 5px 0 #4A4A4A; transition: 0.1s; outline: none;
        }
        button.play-btn { background: #6BCB77; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #4A4A4A; }

        .tips { margin-top: 25px; font-size: 11px; color: #A8A28E; text-align: center; min-height: 50px; width: 100%; }
        
        #msg-bubble { 
            background: white; border: 2px solid #4A4A4A; padding: 10px 15px; border-radius: 15px;
            display: none; margin-bottom: 15px; position: relative; animation: fadeIn 0.3s;
            font-size: 13px; font-weight: bold; color: #333; line-height: 1.5;
            max-width: 80%; box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
        }
        #msg-bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: white transparent; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (min-width: 600px) { #pet-container { font-size: 85px; } }
    </style>
</head>
<body>

    <div id="msg-bubble"></div>
    <div id="pet-container" onclick="touchPet()"> (๑>◡<๑) </div>
    
    <div class="stats">
        <div class="bar-label"><span>肚子饱饱度</span><span id="h-val">--%</span></div>
        <div class="bar-bg"><div id="h-fill" class="bar-fill"></div></div>
        <div class="bar-label"><span>开心能量</span><span id="s-val">--%</span></div>
        <div class="bar-bg"><div id="s-fill" class="bar-fill"></div></div>
    </div>

    <div class="btns">
        <button onclick="doAction('feed')">喂肉肉 🍖</button>
        <button class="play-btn" onclick="doAction('play')">陪它玩 🧸</button>
    </div>

    <div class="tips">
        <div id="log-content" style="font-weight: bold; color: #666; margin-bottom: 5px;">连接中...</div>
        <div style="font-size: 9px; opacity: 0.7;">全球累计喂食：<span id="f-count">0</span> 次</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, push, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiXh3S17-11md-qWuWbE5qdjyof4BPAAI",
            authDomain: "teny-pet.firebaseapp.com",
            databaseURL: "https://teny-pet-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teny-pet",
            appId: "1:847020832526:web:7576dc46cc24f062bb495f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const petRef = ref(db, 'kids_pet'); 
        const logRef = ref(db, 'kids_logs');

        let audioCtx;
        const riddles = [
            "什么布剪不断？(答：瀑布)", "什么米不能吃？(答：虾米)", "什么球不能踢？(答：地球)",
            "云的爸爸是谁？(答：‘月’)", "哪种马从不走路？(答：海马)", "什么人天天戴帽子？(答：稻草人)",
            "早晨醒来第一件事是什么？(答：睁开眼睛)", "什么牛不会吃草？(答：蜗牛)", "什么水永远用不完？(答：泪水)",
            "森林里谁最快？(答：梅花鹿，因为它有梅花‘路’)"
        ];

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'feed') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
            } else if (type === 'biu') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(700, now);
                osc.frequency.exponentialRampToValueAtTime(1100, now + 0.1);
            } else {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
            }
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        }

        window.touchPet = () => {
            const el = document.getElementById('pet-container');
            const bubble = document.getElementById('msg-bubble');
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 400);
            playSound('biu');

            document.body.style.background = "#FFD1D1"; 
            setTimeout(() => { document.body.style.background = "#FFF9E3"; }, 300);

            // --- 核心逻辑：整点前后5分钟区间 ---
            // 检查逻辑：
            // 1. 如果当前是偶数小时，且分钟 <= 5 (例如 10:00 - 10:05)
            // 2. 如果当前是奇数小时，且分钟 >= 55 (例如 09:55 - 09:59，对应 10:00 的前 5 分钟)
            const isNearEvenHour = (h % 2 === 0 && m <= 5) || ((h + 1) % 2 === 0 && m >= 55);

            if (isNearEvenHour) {
                const targetHour = (m >= 55) ? (h + 1) % 24 : h;
                const r = riddles[Math.floor(Math.random() * riddles.length)];
                bubble.innerText = `🌟 发现 ${targetHour}点 奇遇时间！\nTeny 考考你：${r}`;
                bubble.style.display = 'block';
                setTimeout(() => bubble.style.display = 'none', 8000); 
            } else {
                const oldText = el.innerText;
                el.innerText = "(๑>◡<๑) ⁄"; 
                setTimeout(() => { /* 恢复表情由监听器处理 */ }, 800);
            }
        };

        onValue(petRef, (snapshot) => {
            const data = snapshot.val() || { h: 50, s: 50, f: 0 };
            document.getElementById('h-fill').style.width = (100 - data.h) + '%';
            document.getElementById('s-fill').style.width = data.s + '%';
            document.getElementById('h-val').innerText = Math.floor(100 - data.h) + '%';
            document.getElementById('s-val').innerText = Math.floor(data.s) + '%';
            document.getElementById('f-count').innerText = data.f || 0;
            
            const hour = new Date().getHours();
            let emoji = "(๑>◡<๑)";
            if (hour >= 21 || hour < 7) emoji = "(∪｡∪)｡｡｡zzz"; 
            else if (data.h > 80) emoji = "(๑>﹏<๑)"; 
            else if (data.s < 30) emoji = "(•̯́ ₃ •̯̀)";
            document.getElementById('pet-container').innerText = emoji;
        });

        const recentLogQuery = query(logRef, limitToLast(1));
        onValue(recentLogQuery, (snapshot) => {
            snapshot.forEach((child) => {
                const log = child.val();
                document.getElementById('log-content').innerText = `📍 来自 ${log.loc} 的朋友照顾了它`;
            });
        });

        window.doAction = async (type) => {
            try { playSound(type); } catch(e) {}
            let location = "互联网某处";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const cityData = await res.json();
                location = cityData.city || "神秘城市";
            } catch (e) {}

            runTransaction(petRef, (curr) => {
                if (!curr) curr = { h: 50, s: 50, f: 0 };
                if (type === 'feed') { curr.h = Math.max(0, curr.h - 15); curr.f++; }
                else { curr.s = Math.min(100, curr.s + 15); }
                return curr;
            });
            push(logRef, { loc: location, act: type, t: serverTimestamp() });
        };

        setInterval(() => {
            runTransaction(petRef, (curr) => {
                if (curr) { curr.h = Math.min(100, curr.h + 0.3); curr.s = Math.max(0, curr.s - 0.2); }
                return curr;
            });
        }, 30000);
    </script>
</body>
</html>
