<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teny.cc | 全球共养小宠物</title>
    <style>
        /* 极简主义黑白风格，契合 teny.cc 域名 */
        :root { --bg: #ffffff; --text: #000000; --bar-bg: #eeeeee; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            user-select: none;
        }

        /* 宠物形象区域 */
        #pet-container { 
            font-size: 100px; 
            height: 160px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.1s;
        }

        /* 状态条区域 */
        .stats { width: 260px; margin-top: 20px; }
        .bar-label { 
            font-size: 11px; 
            font-weight: 900; 
            margin-bottom: 5px; 
            display: flex; 
            justify-content: space-between; 
            letter-spacing: 1px;
        }
        .bar-bg { 
            width: 100%; 
            height: 6px; 
            background: var(--bar-bg); 
            border-radius: 3px; 
            margin-bottom: 18px; 
            overflow: hidden; 
            border: 1px solid #000; 
        }
        .bar-fill { height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #hunger-fill { background: #000; } /* 饥饿条 */
        #happy-fill { background: #000; }  /* 心情条 */

        /* 交互按钮 */
        .btns { display: flex; gap: 12px; margin-top: 20px; }
        button { 
            padding: 12px 24px; 
            border: 2px solid #000; 
            background: #fff; 
            font-weight: bold; 
            font-size: 14px;
            cursor: pointer; 
            box-shadow: 5px 5px 0px #000; 
            outline: none; 
            transition: 0.1s;
        }
        button:active { 
            transform: translate(3px, 3px); 
            box-shadow: 2px 2px 0px #000; 
        }

        /* 全球数据信息 */
        .world-info { 
            margin-top: 40px; 
            font-size: 10px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            opacity: 0.4; 
        }
    </style>
</head>
<body>

    <!-- 宠物表情 -->
    <div id="pet-container">...</div>
    
    <div class="stats">
        <div class="bar-label"><span>HUNGER (饥饿度)</span><span id="h-val">0%</span></div>
        <div class="bar-bg"><div id="hunger-fill" class="bar-fill"></div></div>
        
        <div class="bar-label"><span>HAPPINESS (心情值)</span><span id="s-val">0%</span></div>
        <div class="bar-bg"><div id="happy-fill" class="bar-fill"></div></div>
    </div>

    <div class="btns">
        <button onclick="doAction('feed')">FEED (喂食)</button>
        <button onclick="doAction('play')">PLAY (玩耍)</button>
    </div>

    <div class="world-info">Worldwide Total Feeds: <span id="f-count">0</span></div>

    <script type="module">
        // 引入 Firebase 核心模块
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 使用你截图中的真实配置信息
        const firebaseConfig = {
            apiKey: "AIzaSyAiXh3S17-11md-qWuWbE5qdjyof4BPAAI",
            authDomain: "teny-pet.firebaseapp.com",
            databaseURL: "https://teny-pet-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teny-pet",
            storageBucket: "teny-pet.appspot.com",
            messagingSenderId: "847020832526",
            appId: "1:847020832526:web:7576dc46cc24f062bb495f",
            measurementId: "G-43P2VQZ3GD"
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const petRef = ref(db, 'global_pet');

        // 监听云端实时数据变化
        onValue(petRef, (snapshot) => {
            const data = snapshot.val() || { h: 50, s: 50, f: 0 };
            
            // 更新 UI
            document.getElementById('hunger-fill').style.width = data.h + '%';
            document.getElementById('happy-fill').style.width = data.s + '%';
            document.getElementById('h-val').innerText = Math.floor(data.h) + '%';
            document.getElementById('s-val').innerText = Math.floor(data.s) + '%';
            document.getElementById('f-count').innerText = data.f;
            
            // 根据状态变换表情
            let emoji = "乁( ˙ ω ˙ )厂"; // 正常
            if (data.h > 80) emoji = "(つд⊂)"; // 太饿了
            if (data.s < 20) emoji = "(╯︵╰)"; // 不开心
            if (data.h >= 100) emoji = "(X_X)"; // 寄了
            
            document.getElementById('pet-container').innerText = emoji;
        });

        // 互动逻辑（通过事务处理防止多人冲突）
        window.doAction = (type) => {
            runTransaction(petRef, (currentData) => {
                if (!currentData) currentData = { h: 50, s: 50, f: 0 };
                
                if (type === 'feed') {
                    currentData.h = Math.max(0, currentData.h - 15); // 减少饥饿
                    currentData.f = (currentData.f || 0) + 1;       // 增加全球喂食总数
                } else if (type === 'play') {
                    currentData.s = Math.min(100, currentData.s + 15); // 增加快乐
                }
                return currentData;
            });
        };

        // 模拟时间流逝（每 20 秒自动消耗一点数值）
        setInterval(() => {
            runTransaction(petRef, (currentData) => {
                if (currentData) {
                    currentData.h = Math.min(100, currentData.h + 1); // 慢慢变饿
                    currentData.s = Math.max(0, currentData.s - 1);   // 慢慢变无聊
                }
                return currentData;
            });
        }, 20000);
    </script>
</body>
</html>
